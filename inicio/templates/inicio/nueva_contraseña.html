<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña</title>
    <link rel="stylesheet" href="../../static/css/nueva_contraseña.css">
  </head>

  <body>
    <div class="registro-card">

      <header class="encabezado">
        <img src="../../static/logo.png" alt="Logo" class="logo">
      </header>

      <img src="../../static/css/image 1.png" alt="Aqua Conciencia" style="display:block; margin:0 auto 20px; width:220px;">

      <h2>Restablecer Contraseña</h2>
      <p class="descripcion">Escriba la nueva contraseña y confirme para finalizar.</p>

      <label>Nueva Contraseña</label>
      <div class="campo-password">
          <input type="password" placeholder="Ingrese su nueva contraseña" id="password1">
          <span class="toggle-password" onclick="togglePassword('password1')">👁️</span>
      </div>

      <label>Reescribir Contraseña</label>
      <div class="campo-password">
          <input type="password" placeholder="Confirme su contraseña" id="password2">
          <span class="toggle-password" onclick="togglePassword('password2')">👁️</span>
      </div>

      <div style="display:flex; justify-content:center;">
        <button class="btn-crear" onclick="document.getElementById('modal').style.display='flex'">Finalizar</button>
      </div>

    </div>

    <!-- Modal -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
      <div style="background:white; border-radius:10px; border:2px solid black; padding:40px 50px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.3); max-width:400px; width:90%;">
        
        <img src="../../static/css/logo2.png" alt="Logo" style="width:80px; margin-bottom:10px;">
        <img src="../../static/css/image 1.png" alt="Aqua Conciencia" style="display:block; margin:0 auto 20px; width:180px;">
        
        <p style="font-size:18px; font-weight:bold; color:#111; margin-bottom:25px;">✅ Contraseña Cambiada Exitosamente</p>
        
        <a href="{% url 'inicio' %}">
          <button class="btn-crear" style="margin:0 auto;">Volver al Login</button>
        </a>
      </div>
    </div>

    <script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    </script>

  </body>
</html>
