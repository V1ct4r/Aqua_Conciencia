{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaConciencia</title>

    <link rel="stylesheet" href="{% static 'css/panel.css' %}">
</head>
<body>

<div class="contenedor">

    <header>
        <div class="logo">
            <!-- Logo original -->
            <img src="{% static 'css/logo.png' %}" alt="Logo AquaConciencia">
            <!-- Nuevo logo adicional -->
            <img src="{% static 'css/image 1.png' %}" alt="Logo AquaConciencia Alternativo">
        </div>

        <nav class="menu">
            <a href="{% url 'panel' %}">Mapa</a>
            <a href="{% url 'quiz_inicio' %}">Quiz</a>
            <a href="{% url 'ayuda' %}">Ayuda</a>
        </nav>

        <div class="iconos">
            <a href="{% url 'panel' %}">
                <img src="{% static 'css/logo.casa.png' %}" alt="Inicio">
            </a>
            <a href="{% url 'perfil' %}">
                <img src="{% static 'css/logo.usuario.png' %}" alt="Usuario">
            </a>
        </div>
    </header>

    <div class="dashboard">

        <div class="principal">
            <div class="mapa-wrapper">
                <img src="{% static 'css/logo_para_aquaconciencia.png' %}" alt="Mapa de Chiloé" class="imagen-mapa">

                <!-- Puntos clickeables -->
                <a href="{% url 'comuna' 'ancud' %}" class="punto-comuna" style="top:20%; left:30%;"></a>
                <a href="{% url 'comuna' 'quemchi' %}" class="punto-comuna" style="top:25%; left:40%;"></a>
                <a href="{% url 'comuna' 'dalcahue' %}" class="punto-comuna" style="top:35%; left:50%;"></a>
                <a href="{% url 'comuna' 'castro' %}" class="punto-comuna" style="top:45%; left:55%;"></a>
                <a href="{% url 'comuna' 'chonchi' %}" class="punto-comuna" style="top:55%; left:60%;"></a>
                <a href="{% url 'comuna' 'quellon' %}" class="punto-comuna" style="top:70%; left:65%;"></a>
            </div>

            <div class="accesos">
                <a href="{% url 'noticias' %}" class="acceso">Noticias</a>
                <a href="#" class="acceso">Actividades</a>
            </div>
        </div>

        <div class="sidebar">
            <div class="progreso">
                <h3>0%</h3>
                <p>Progreso</p>
                <!-- Vaso con agua animada -->
                <div class="glass">
                    <div class="water"></div>
                </div>
            </div>

            <div class="info">
                <div>
                    <h3>Información</h3>
                    <p>
                        Selecciona una comuna del mapa para visualizar
                        información relacionada con la contaminación
                        ambiental y la conservación de los ecosistemas
                        del Archipiélago de Chiloé.
                    </p>
                </div>
            </div>
        </div>

    </div>

</div>
