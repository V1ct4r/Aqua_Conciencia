{% load static %}
 
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaConciencia</title>
    <link rel="stylesheet" href="{% static 'css/panel.css' %}">
</head>
<body>
 
<div class="contenedor">
 
    <header>
 
        <div class="logo">
            <img src="{% static 'css/logo.png' %}" alt="Logo AquaConciencia">
            <div class="texto-logo">
                <h1>Aqua</h1>
                <h1>Conciencia</h1>
            </div>
        </div>
 
        <nav class="menu">
            <a href="{% url 'panel' %}">Mapa</a>
            <a href="#">Quiz</a>
            <a href="#">Ayuda</a>
        </nav>
 
        <div class="iconos">
            <a href="{% url 'panel' %}">
                <img src="{% static 'css/logo.casa.png' %}" alt="Inicio">
            </a>
            <a href="{% url 'perfil' %}">
                <img src="{% static 'css/logo.usuario.png' %}" alt="Usuario">
            </a>
        </div>
 
    </header>
 
    <div class="dashboard">
 
        <div class="principal">
 
            <div class="mapa">
 
                <div class="mapa-wrapper" id="mapaWrapper">
 
                    <img
                        src="{% static 'css/logo_para_aquaconciencia.png' %}"
                        alt="Mapa de Chiloé"
                        class="imagen-mapa"
                        id="imagenMapa"
                    >
 
                    <a class="punto-comuna" href="{% url 'comuna' 'ancud' %}"
                    style="left: 44%; top: 24.2%;" title="Ancud"></a>

                    <a class="punto-comuna" href="{% url 'comuna' 'quemchi' %}"
                    style="left: 68.1%; top: 35%;" title="Quemchi"></a>

                    <a class="punto-comuna" href="{% url 'comuna' 'dalcahue' %}"
                    style="left: 31.2%; top: 51.3%;" title="Dalcahue"></a>

                    <a class="punto-comuna" href="{% url 'comuna' 'castro' %}"
                    style="left: 50.8%; top: 61%;" title="Castro"></a>

                    <a class="punto-comuna" href="{% url 'comuna' 'chonchi' %}"
                    style="left: 37.3%; top: 75.4%;" title="Chonchi"></a>

                    <a class="punto-comuna" href="{% url 'comuna' 'quellon' %}"
                    style="left: 52.1%; top: 91%;" title="Quellón"></a>
 
                </div>
 
            </div>
 
            <div class="accesos">
                <a href="{% url 'noticias' %}" class="acceso">Noticias</a>
                <a href="#" class="acceso">Actividades</a>
            </div>
 
        </div>
 
        <div class="sidebar">
 
            <div class="progreso">
                <h3>0%</h3>
            </div>
 
            <div class="info">
                <div>
                    <h3>Información</h3>
                    <p>
                        Selecciona una comuna del mapa para visualizar
                        información relacionada con la contaminación
                        ambiental y la conservación de los ecosistemas
                        del Archipiélago de Chiloé.
                    </p>
                </div>
            </div>
 
        </div>
 
    </div>
 
</div>
 
</body>
</html>
