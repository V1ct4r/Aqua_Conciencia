<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AquaConciencia</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#f4f8f9;
        }

        header{
            background:#0a7c86;
            color:white;
            padding:20px;
            text-align:center;
        }

        .contenedor{
            display:flex;
        }

        aside{
            width:220px;
            background:#dff2f4;
            min-height:100vh;
            padding:20px;
        }

        aside ul{
            list-style:none;
            padding:0;
        }

        aside li{
            margin-bottom:15px;
        }

        aside a{
            text-decoration:none;
            color:#003b46;
            font-weight:bold;
        }

        main{
            flex:1;
            padding:30px;
        }

        .tarjeta{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .cards{
            display:flex;
            gap:20px;
            margin-top:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            flex:1;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

<header>
    <h1>AquaConciencia</h1>
</header>

<div class="contenedor">

    <aside>
        <ul>
            <li><a href="/panel/">Inicio</a></li>
            <li><a href="/noticias/">Noticias</a></li>
            <li><a href="/foro/">Foro</a></li>
            <li><a href="/perfil/">Perfil</a></li>
            <li><a href="/configuracion/">Configuración</a></li>
        </ul>
    </aside>

    <main>

        <div class="tarjeta">
            <h2>Bienvenido</h2>
            <p>Plataforma de concientización ambiental de Chiloé.</p>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Noticias</h3>
                <p>Últimas novedades ambientales.</p>
            </div>

            <div class="card">
                <h3>Foro</h3>
                <p>Participa en debates comunitarios.</p>
            </div>

            <div class="card">
                <h3>Chiloé</h3>
                <p>Información sobre ecosistemas locales.</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
