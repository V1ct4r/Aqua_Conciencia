<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Cuenta - Aqua Conciencia</title>

    <link rel="stylesheet" href="../../static/css/creacion_cuenta.css">
</head>

<body>

    <header>

        <h1>
            <span style="color:#005A8C;">Aqua</span><br>
            <span style="color:#2E9E3E;">Conciencia</span>
        </h1>

        <div class="encabezado">
            <img src="../../static/logo.png" alt="Logo" class="logo">
        </div>

    </header>

    <section>

        <h2>Crear Cuenta</h2>

        <form method="POST">
            {% csrf_token %}

            <p>Correo Electrónico</p>
            <input
                type="email"
                name="correo"
                placeholder="Ingrese su correo"
                required
            >

            <p>Nombre de usuario</p>
            <input
                type="text"
                name="usuario"
                placeholder="Ingrese su usuario"
                required
            >

            <p>Contraseña</p>
            <input
                type="password"
                name="password"
                placeholder="Ingrese su contraseña"
                required
            >

            <br>

            <button type="submit">
                Crear cuenta
            </button>

        </form>

    </section>

</body>
</html>
