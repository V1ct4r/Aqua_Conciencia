{% load static %}
<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AquaConciencia - Login</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

    <header>
        <div class="encabezado">

            <h1>
                <span style="color:#005A8C;">Aqua</span><br>
                <span style="color:#2E9E3E;">Conciencia</span>
            </h1>

            <img src="{% static 'logo.png' %}" alt="Logo" class="logo">

        </div>
    </header>

    <section>

        <form method="POST">
            {% csrf_token %}

            <p>Nombre de usuario</p>
            <input type="text" name="usuario">

            <p>Contraseña</p>
            <input type="password" name="password">

            <button type="submit">
                Iniciar sesión
            </button>

        </form>

        <a href="{% url 'crear_cuenta' %}">
            <button type="button">
                Crear una cuenta
            </button>
        </a>

        <a href="{% url 'restablecer' %}">
            <button type="button" class="boton-restablecer">
                Restablecer contraseña
            </button>
        </a>

    </section>

    <script src="{% static 'js/login.js' %}"></script>

</body>

</html>
